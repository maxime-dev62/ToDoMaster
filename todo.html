<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Réalisation d'un site pour la gestion des tâches">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Maxime DJOSSOU">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta http-equiv="pragma" content="no-cache">
    <meta name="keywords" content="Maxime DJOSSOU,Maxime ,DJOSSOU,to do list,tâche,Gestionnaire,Cotonou,dev">
    <title>TodoMaster - Gestionnaire de Tâches Avancé</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        /* En-tête */
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .header p {
            opacity: 0.9;
        }
        /* Carte principale */
        
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            margin-bottom: 20px;
        }
        /* Section d'ajout */
        
        .add-section {
            padding: 25px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        #taskInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        #taskInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .priority-select {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            background: white;
        }
        
        #addBtn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        #addBtn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .date-input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            width: 100%;
        }
        /* Filtres et recherche */
        
        .controls-section {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .search-box {
            margin-bottom: 15px;
        }
        
        #searchInput {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .filter-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .filter-btn.active {
            background: #667eea;
            color: white;
        }
        
        .priority-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .priority-filter-btn {
            background: #f0f0f0;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .priority-filter-btn.active {
            color: white;
        }
        
        .priority-high.active {
            background: #e74c3c;
        }
        
        .priority-medium.active {
            background: #f39c12;
        }
        
        .priority-low.active {
            background: #27ae60;
        }
        /* Liste des tâches */
        
        .task-list-section {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .task-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }
        
        .task-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .task-content {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }
        
        .task-checkbox {
            margin-top: 3px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .task-details {
            flex: 1;
        }
        
        .task-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
            word-break: break-word;
        }
        
        .task-text.completed {
            text-decoration: line-through;
            color: #999;
        }
        
        .task-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 12px;
        }
        
        .priority-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
        }
        
        .priority-high {
            background: #fee;
            color: #e74c3c;
        }
        
        .priority-medium {
            background: #fef5e7;
            color: #f39c12;
        }
        
        .priority-low {
            background: #e8f8f5;
            color: #27ae60;
        }
        
        .due-date {
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .due-date.overdue {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .task-actions {
            display: flex;
            gap: 8px;
        }
        
        .edit-btn,
        .delete-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }
        
        .edit-btn {
            background: #3498db;
            color: white;
        }
        
        .edit-btn:hover {
            background: #2980b9;
        }
        
        .delete-btn {
            background: #e74c3c;
            color: white;
        }
        
        .delete-btn:hover {
            background: #c0392b;
        }
        /* Statistiques */
        
        .stats-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 20px;
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            text-align: center;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
        /* Modal d'édition */
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
        }
        
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            .task-content {
                flex-direction: column;
            }
            .task-actions {
                align-self: flex-end;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>✨ TodoMaster ✨</h1>
            <p>Gérez vos tâches comme un pro</p>
        </div>

        <div class="card">
            <div class="add-section">
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="Nouvelle tâche...">
                    <select id="prioritySelect" class="priority-select">
                        <option value="high">🔴 Haute priorité</option>
                        <option value="medium">🟠 Priorité moyenne</option>
                        <option value="low">🟢 Basse priorité</option>
                    </select>
                    <button id="addBtn">Ajouter</button>
                </div>
                <input type="date" id="dueDateInput" class="date-input">
            </div>

            <div class="controls-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Rechercher une tâche...">
                </div>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">Toutes</button>
                    <button class="filter-btn" data-filter="active">Actives</button>
                    <button class="filter-btn" data-filter="completed">Terminées</button>
                </div>
                <div class="priority-filters">
                    <button class="priority-filter-btn" data-priority="all">Toutes priorités</button>
                    <button class="priority-filter-btn priority-high" data-priority="high">🔴 Haute</button>
                    <button class="priority-filter-btn priority-medium" data-priority="medium">🟠 Moyenne</button>
                    <button class="priority-filter-btn priority-low" data-priority="low">🟢 Basse</button>
                </div>
            </div>

            <div class="task-list-section">
                <ul id="taskList" style="list-style: none;"></ul>
            </div>
        </div>

        <div class="stats-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Total tâches</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Terminées</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="activeTasks">0</div>
                    <div class="stat-label">Actives</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="overdueTasks">0</div>
                    <div class="stat-label">En retard</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal d'édition -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Modifier la tâche</h3>
            <input type="text" id="editTaskInput" placeholder="Nouveau texte">
            <select id="editPrioritySelect">
                <option value="high">🔴 Haute priorité</option>
                <option value="medium">🟠 Priorité moyenne</option>
                <option value="low">🟢 Basse priorité</option>
            </select>
            <input type="date" id="editDueDateInput">
            <div class="modal-buttons">
                <button id="saveEditBtn" class="edit-btn">Enregistrer</button>
                <button id="closeModalBtn" class="delete-btn">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let currentFilter = 'all';
        let currentPriorityFilter = 'all';
        let currentEditId = null;

        // Éléments DOM
        const taskInput = document.getElementById('taskInput');
        const prioritySelect = document.getElementById('prioritySelect');
        const dueDateInput = document.getElementById('dueDateInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const searchInput = document.getElementById('searchInput');
        const editModal = document.getElementById('editModal');
        const editTaskInput = document.getElementById('editTaskInput');
        const editPrioritySelect = document.getElementById('editPrioritySelect');
        const editDueDateInput = document.getElementById('editDueDateInput');
        const saveEditBtn = document.getElementById('saveEditBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // Charger depuis localStorage
        function loadTasks() {
            const saved = localStorage.getItem('tasks_advanced');
            if (saved) {
                tasks = JSON.parse(saved);
            }
            renderTasks();
        }

        // Sauvegarder
        function saveTasks() {
            localStorage.setItem('tasks_advanced', JSON.stringify(tasks));
        }

        // Ajouter une tâche
        function addTask() {
            const text = taskInput.value.trim();
            if (!text) {
                alert('Veuillez entrer une tâche !');
                return;
            }

            const newTask = {
                id: Date.now(),
                text: text,
                completed: false,
                priority: prioritySelect.value,
                dueDate: dueDateInput.value,
                createdAt: new Date().toISOString()
            };

            tasks.push(newTask);
            saveTasks();
            taskInput.value = '';
            dueDateInput.value = '';
            renderTasks();
        }

        // Supprimer
        function deleteTask(id) {
            if (confirm('Supprimer cette tâche ?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
            }
        }

        // Basculer statut
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }

        // Éditer
        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                currentEditId = id;
                editTaskInput.value = task.text;
                editPrioritySelect.value = task.priority;
                editDueDateInput.value = task.dueDate || '';
                editModal.style.display = 'flex';
            }
        }

        // Sauvegarder édition
        function saveEdit() {
            const task = tasks.find(t => t.id === currentEditId);
            if (task) {
                task.text = editTaskInput.value.trim();
                task.priority = editPrioritySelect.value;
                task.dueDate = editDueDateInput.value;
                saveTasks();
                renderTasks();
                closeModal();
            }
        }

        // Fermer modal
        function closeModal() {
            editModal.style.display = 'none';
            currentEditId = null;
        }

        // Vérifier si une tâche est en retard
        function isOverdue(task) {
            if (task.completed || !task.dueDate) return false;
            const today = new Date().toISOString().split('T')[0];
            return task.dueDate < today;
        }

        // Filtrer les tâches
        function getFilteredTasks() {
            let filtered = [...tasks];

            // Filtre de statut
            if (currentFilter === 'active') {
                filtered = filtered.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filtered = filtered.filter(t => t.completed);
            }

            // Filtre de priorité
            if (currentPriorityFilter !== 'all') {
                filtered = filtered.filter(t => t.priority === currentPriorityFilter);
            }

            // Recherche
            const searchTerm = searchInput.value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(t => t.text.toLowerCase().includes(searchTerm));
            }

            // Trier par priorité et date
            const priorityOrder = {
                high: 1,
                medium: 2,
                low: 3
            };
            filtered.sort((a, b) => {
                if (a.priority !== b.priority) {
                    return priorityOrder[a.priority] - priorityOrder[b.priority];
                }
                if (a.dueDate && b.dueDate) {
                    return a.dueDate.localeCompare(b.dueDate);
                }
                return b.id - a.id;
            });

            return filtered;
        }

        // Mettre à jour les statistiques
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const active = total - completed;
            const overdue = tasks.filter(t => isOverdue(t)).length;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('activeTasks').textContent = active;
            document.getElementById('overdueTasks').textContent = overdue;
        }

        // Formater la date
        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR', {
                day: 'numeric',
                month: 'short'
            });
        }

        // Afficher les tâches
        function renderTasks() {
            const filtered = getFilteredTasks();

            if (filtered.length === 0) {
                taskList.innerHTML = '<div class="empty-message">🎯 Aucune tâche trouvée</div>';
                updateStats();
                return;
            }

            taskList.innerHTML = '';
            filtered.forEach(task => {
                        const li = document.createElement('li');
                        li.className = 'task-item';

                        const overdue = isOverdue(task);

                        li.innerHTML = `
                    <div class="task-content">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                        <div class="task-details">
                            <div class="task-text ${task.completed ? 'completed' : ''}">${escapeHtml(task.text)}</div>
                            <div class="task-meta">
                                <span class="priority-badge priority-${task.priority}">
                                    ${task.priority === 'high' ? '🔴' : task.priority === 'medium' ? '🟠' : '🟢'} 
                                    ${task.priority === 'high' ? 'Haute' : task.priority === 'medium' ? 'Moyenne' : 'Basse'}
                                </span>
                                ${task.dueDate ? `
                                    <span class="due-date ${overdue ? 'overdue' : ''}">
                                        📅 ${formatDate(task.dueDate)} ${overdue ? '(En retard!)' : ''}
                                    </span>
                                ` : ''}
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="edit-btn">✏️ Modifier</button>
                            <button class="delete-btn">🗑️ Supprimer</button>
                        </div>
                    </div>
                `;
                
                const checkbox = li.querySelector('.task-checkbox');
                const editBtn = li.querySelector('.edit-btn');
                const deleteBtn = li.querySelector('.delete-btn');
                
                checkbox.addEventListener('change', () => toggleTask(task.id));
                editBtn.addEventListener('click', () => editTask(task.id));
                deleteBtn.addEventListener('click', () => deleteTask(task.id));
                
                taskList.appendChild(li);
            });
            
            updateStats();
        }

        // Échapper le HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Changer filtre statut
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderTasks();
        }

        // Changer filtre priorité
        function setPriorityFilter(priority) {
            currentPriorityFilter = priority;
            document.querySelectorAll('.priority-filter-btn').forEach(btn => {
                if (btn.dataset.priority === priority) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderTasks();
        }

        // Initialisation
        function init() {
            loadTasks();
            addBtn.addEventListener('click', addTask);
            taskInput.addEventListener('keypress', (e) => e.key === 'Enter' && addTask());
            searchInput.addEventListener('input', () => renderTasks());
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => setFilter(btn.dataset.filter));
            });
            
            document.querySelectorAll('.priority-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => setPriorityFilter(btn.dataset.priority));
            });
            
            saveEditBtn.addEventListener('click', saveEdit);
            closeModalBtn.addEventListener('click', closeModal);
            editModal.addEventListener('click', (e) => {
                if (e.target === editModal) closeModal();
            });
        }

        init();
    </script>
</body>

</html>
